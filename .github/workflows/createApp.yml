name: NSYSU-Build-and-Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release NSYSU
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 設置 Java 環境 (Android 必需)
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. 設置 Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: true

      - run: flutter pub get

      # 3. 自動從 pubspec.yaml 抓取版本號
      - name: Get Version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      # 4. Android 建置 (使用 --split-per-abi 縮減體積)
      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk/
          mv app-armeabi-v7a-release.apk NSYSU-v7a.apk
          mv app-arm64-v8a-release.apk NSYSU-v8a.apk
          mv app-x86_64-release.apk NSYSU-x64.apk

      # 5. iOS 建置 (免簽名建置並手動打包成 IPA)
      - name: Install Pods
        run: pod install --repo-update
        working-directory: ios

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 NSYSU.ipa Payload
        working-directory: build/ios/iphoneos

      # 6. 整理發布檔案至 dist/
      - name: Stage Artifacts
        run: |
          mkdir -p dist
          cp build/ios/iphoneos/NSYSU.ipa dist/
          cp build/app/outputs/flutter-apk/NSYSU-*.apk dist/

      # 7. 上傳至 GitHub Release 並自動寫入說明文字
      - name: Upload Binaries to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: ${{ steps.get_version.outputs.VERSION }}
          overwrite: true
          body: |
            ## 📦 檔案下載說明 (2026/03/02)
            本版本已針對不同裝置進行優化，請依據您的設備選擇對應檔案下載：

            * **NSYSU-v8a.apk**: **(推薦)** 適用於絕大多數現代 Android 手機。
            * **NSYSU-v7a.apk**: 適用於較舊型號的 Android 手機。
            * **NSYSU-x64.apk**: 適用於電腦上的 Android 模擬器。
            * **NSYSU.ipa**: 適用於 iOS 裝置（此版本未簽名，需自行簽署或透過 sideload 安裝）。

            ---
            *NSYSU 自動建置系統 - 版本號: ${{ steps.get_version.outputs.VERSION }}*
            *Commit: ${{ github.sha }}*
